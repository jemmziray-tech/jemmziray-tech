name: WakaTime Readme

on:
  schedule:
    - cron: "0 0 * * *" # Runs every night at midnight
  workflow_dispatch:

jobs:
  update-readme:
    name: Update WakaTime Stat
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          SHOW_TITLE: true
          BLOCKS: ->
          TIME_RANGE: last_7_days
